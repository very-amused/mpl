bind p = play_toggle();
bind Escape = quit();
bind m = show_metadata();
bind , = seek_snap(-1000);
bind . = seek_snap(1000);
bind < = seek_snap(-5000);
bind > = seek_snap(5000);
bind q = queue();
bind : = shell_open();
shbind Escape = shell_close();
shbind < = shell_history_prev();
shbind > = shell_history_next();
